<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="540" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#1f2328">The 1Password item, decomposed into the secret reference</text>
  <text x="1160" y="34" font-size="14" fill="#6e7781" text-anchor="end">Illustration – not an app screenshot</text>

  <!-- vault card -->
  <rect x="40" y="86" width="520" height="360" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/>
  <rect x="40" y="86" width="520" height="56" rx="14" fill="#0a2540"/>
  <rect x="40" y="122" width="520" height="20" fill="#0a2540"/>
  <text x="66" y="121" font-size="18" font-weight="700" fill="#ffffff">Vault: Private</text>

  <rect x="66" y="168" width="468" height="66" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <circle cx="100" cy="201" r="17" fill="#0969da"/>
  <text x="100" y="207" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">G</text>
  <text x="130" y="196" font-size="17" font-weight="600" fill="#1f2328">Granola</text>
  <text x="130" y="218" font-size="13" fill="#57606a">API credential item</text>

  <rect x="66" y="252" width="468" height="110" rx="10" fill="#ffffff" stroke="#8250df" stroke-width="2"/>
  <text x="90" y="284" font-size="13" font-weight="700" fill="#8250df" letter-spacing="1">FIELD: credential</text>
  <text x="90" y="322" font-size="22" font-family="Menlo, Consolas, monospace" fill="#1f2328">&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;</text>
  <text x="90" y="350" font-size="13" fill="#57606a">paste the key here, in the app – it never touches a terminal</text>

  <text x="66" y="416" font-size="14" fill="#57606a">Settings &#8594; Developer &#8594; "Integrate with 1Password CLI" must be on.</text>

  <!-- reference, right side -->
  <text x="640" y="120" font-size="16" font-weight="600" fill="#57606a">The tool reads exactly this reference:</text>
  <rect x="640" y="140" width="520" height="72" rx="10" fill="#0d1117"/>
  <text x="668" y="185" font-size="21" font-family="Menlo, Consolas, monospace">
    <tspan fill="#8b949e">op://</tspan><tspan fill="#3fb950">Private</tspan><tspan fill="#8b949e">/</tspan><tspan fill="#58a6ff">Granola</tspan><tspan fill="#8b949e">/</tspan><tspan fill="#d2a8ff">credential</tspan>
  </text>

  <!-- mapping legend -->
  <rect x="640" y="240" width="16" height="16" rx="4" fill="#3fb950"/>
  <text x="668" y="254" font-size="16" fill="#1f2328"><tspan font-family="Menlo, Consolas, monospace" fill="#116329">Private</tspan>  = the vault</text>
  <rect x="640" y="280" width="16" height="16" rx="4" fill="#58a6ff"/>
  <text x="668" y="294" font-size="16" fill="#1f2328"><tspan font-family="Menlo, Consolas, monospace" fill="#0969da">Granola</tspan>  = the item</text>
  <rect x="640" y="320" width="16" height="16" rx="4" fill="#d2a8ff"/>
  <text x="668" y="334" font-size="16" fill="#1f2328"><tspan font-family="Menlo, Consolas, monospace" fill="#8250df">credential</tspan>  = the field</text>

  <text x="640" y="392" font-size="14.5" fill="#57606a">Different names? Point the tool elsewhere:</text>
  <rect x="640" y="406" width="520" height="40" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="660" y="432" font-size="14.5" font-family="Menlo, Consolas, monospace" fill="#1f2328">GRANOLA_OP_REF=op://&lt;vault&gt;/&lt;item&gt;/&lt;field&gt;</text>

  <rect x="40" y="472" width="1120" height="44" rx="8" fill="#dafbe1" stroke="#2da44e"/>
  <text x="600" y="500" font-size="15" fill="#116329" text-anchor="middle" font-weight="600">Verify without ever printing the key:  bun tools/granola-fetch.ts check   (never "test" with a bare op read – that echoes the key into scrollback)</text>
</svg>
